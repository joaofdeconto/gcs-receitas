services:
  app_prod:
    build:
      context: ../../app
      dockerfile: Dockerfile
    container_name: gcs_app_prod
    volumes:
      - ../../app:/var/www
    env_file:
      - ../../app/.env.prod
    depends_on:
      mysql_prod:
        condition: service_healthy
    networks:
      - gcs_prod

  nginx_prod:
    image: nginx:alpine
    container_name: gcs_nginx_prod
    ports:
      - "8082:80"
    volumes:
      - ../../app:/var/www
      - ../../app/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app_prod
    networks:
      - gcs_prod

  mysql_prod:
    image: mysql:8.0
    container_name: gcs_mysql_prod
    environment:
      MYSQL_DATABASE: gcs_prod
      MYSQL_USER: gcs_user
      MYSQL_PASSWORD: gcs_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3308:3306"
    volumes:
      - mysql_prod_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "gcs_user", "-pgcs_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gcs_prod

networks:
  gcs_prod:
    driver: bridge

volumes:
  mysql_prod_data:
