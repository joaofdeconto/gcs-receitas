services:
  app_homolog:
    build:
      context: ../../app
      dockerfile: Dockerfile
    container_name: gcs_app_homolog
    volumes:
      - ../../app:/var/www
    env_file:
      - ../../app/.env.homolog
    depends_on:
      mysql_homolog:
        condition: service_healthy
    networks:
      - gcs_homolog

  nginx_homolog:
    image: nginx:alpine
    container_name: gcs_nginx_homolog
    ports:
      - "8081:80"
    volumes:
      - ../../app:/var/www
      - ../../app/nginx/default.homolog.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app_homolog
    networks:
      - gcs_homolog

  mysql_homolog:
    image: mysql:8.0
    container_name: gcs_mysql_homolog
    environment:
      MYSQL_DATABASE: gcs_homolog
      MYSQL_USER: gcs_user
      MYSQL_PASSWORD: gcs_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_homolog_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "gcs_user", "-pgcs_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gcs_homolog

networks:
  gcs_homolog:
    driver: bridge

volumes:
  mysql_homolog_data:
